services:
  obsidian-livesync-mcp:
    build: .
    container_name: obsidian-livesync-mcp
    ports:
      - "${MCP_PORT:-3100}:3100"
    environment:
      hostname: ${COUCHDB_URL:?COUCHDB_URL is required}
      dbname: ${DBNAME:?DBNAME is required}
      username: ${COUCHDB_USER:-}
      password: ${COUCHDB_PASSWORD:-}
      PASSPHRASE: ${PASSPHRASE:?PASSPHRASE is required}
      MCP_API_KEY: ${MCP_API_KEY:-}
      MCP_TRANSPORT: sse
      MCP_PORT: "3100"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CACHE_TTL: ${CACHE_TTL:-60}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-30000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
